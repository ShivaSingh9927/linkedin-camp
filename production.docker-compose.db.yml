# =============================================================================
# Production compose for the DB/AI server (Hetzner qampi-db-01, 10.0.0.4)
# Runs:  postgres  +  redis  +  ai-service
# All ports bound to the private-net IP — never exposed on the public IP.
# Public access is also blocked by ufw + Hetzner Cloud Firewall (Phase 3).
# =============================================================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${PRIVATE_IP}:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - "yes"
    ports:
      - "${PRIVATE_IP}:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./apps/ai-service
    image: linkedin-camp-ai-service:latest
    container_name: ai-service
    restart: unless-stopped
    environment:
      GROQ_API: ${GROQ_API}
    ports:
      - "${PRIVATE_IP}:8001:8001"

volumes:
  pg_data:
  redis_data:
