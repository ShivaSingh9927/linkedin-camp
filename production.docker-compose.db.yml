# =============================================================================
# Production compose for the DB/AI server (Hetzner qampi-db-01, 10.0.0.4)
# Runs:  postgres  +  redis  +  ai-service
# All ports bound to the private-net IP — never exposed on the public IP.
# Public access is also blocked by ufw + Hetzner Cloud Firewall (Phase 3).
# =============================================================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${PRIVATE_IP}:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    # No password — Redis only listens on the private 10.0.0.4 IP and is
    # firewalled. Authoritative production state; do not re-introduce a
    # password without rotating it in every consumer's env at the same time.
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${PRIVATE_IP}:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./apps/ai-service
    image: linkedin-camp-ai-service:latest
    container_name: ai-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # Cloudflare AI Gateway (BYOK routes to OpenRouter/DeepSeek/Groq)
      CLOUDFLARE_AI_GATEWAY_URL: ${CLOUDFLARE_AI_GATEWAY_URL}
      CF_AIG_TOKEN: ${CF_AIG_TOKEN}
      CF_BYOK_ALIAS_OPENROUTER: ${CF_BYOK_ALIAS_OPENROUTER:-qampi-openrouter}
      CF_BYOK_ALIAS_DEEPSEEK: ${CF_BYOK_ALIAS_DEEPSEEK:-qampi-deepseek-v4-flash}
      CF_BYOK_ALIAS_GROQ: ${CF_BYOK_ALIAS_GROQ:-}
      # Direct DeepSeek fallback (used only if CF gateway env vars are missing)
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_API: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      # Provider direct keys (some agents may use these via Cloudflare BYOK)
      GROQ_API: ${GROQ_API}
      # Model selection: 'test' (free OpenRouter) or 'production'
      AI_MODE: ${AI_MODE:-production}
      # Hard request timeout on every LLM call (seconds)
      LLM_HTTP_TIMEOUT_SECONDS: ${LLM_HTTP_TIMEOUT_SECONDS:-60}
      # Redis for strategy cache (24h TTL, survives container restart)
      REDIS_URL: redis://redis:6379
      # Sentry — same DSN as backend; events tagged service=ai-service
      SENTRY_DSN: ${SENTRY_DSN}
      NODE_ENV: ${NODE_ENV:-production}
      # CORS allowlist (ai-service is on private IP so this is defense-in-depth)
      CORS_ORIGIN: ${CORS_ORIGIN:-https://app.qampi.com,https://qampi.com,https://www.qampi.com}
    ports:
      - "${PRIVATE_IP}:8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2).status == 200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pg_data:
  redis_data:
