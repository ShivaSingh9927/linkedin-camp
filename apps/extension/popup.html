<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

    body {
      width: 320px;
      margin: 0;
      padding: 24px;
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 18px;
    }

    h3 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.025em;
    }

    .card {
      background: white;
      border: 1px border-slate-200;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .status-label {
      color: #64748b;
      font-weight: 600;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.025em;
    }

    .badge-success {
      background: #f0fdf4;
      color: #166534;
    }

    .badge-error {
      background: #fef2f2;
      color: #991b1b;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.2);
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #94a3b8;
      font-weight: 500;
    }

    a {
      color: #4f46e5;
      text-decoration: none;
      font-weight: 700;
    }

    .sync-info {
      font-size: 12px;
      color: #475569;
      line-height: 1.5;
      margin-top: 12px;
      background: #f1f5f9;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="logo">A</div>
    <h3>AutoConnect<span style="color:#6366f1">.</span></h3>
  </div>

  <div class="card">
    <div class="status-item">
      <span class="status-label">Engine Connection</span>
      <span id="auth-status" class="badge badge-error">Disconnected</span>
    </div>
    <div id="info-text" class="sync-info">
      Sync your LinkedIn session to allow the cloud engine to execute tasks on your behalf.
    </div>
  </div>

  <button id="sync-btn" class="btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 2v6h-6"></path>
      <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
      <path d="M3 22v-6h6"></path>
      <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
    </svg>
    Sync Session
  </button>

  <div style="margin-top: 24px;" class="footer">
    Manage your results in the <a href="http://localhost:3000" target="_blank">Campaign Dashboard</a>
  </div>

  <script src="popup.js"></script>
</body>

</html>
