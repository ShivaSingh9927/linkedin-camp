<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 340px;
      font-family: 'Inter', -apple-system, sans-serif;
      background: #ffffff;
      color: #1e293b;
    }

    /* --- Header --- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #f1f5f9;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 14px;
    }

    .brand {
      font-weight: 800;
      font-size: 16px;
      letter-spacing: -0.5px;
      color: #1e293b;
    }

    .brand span {
      color: #6366f1;
    }

    .auth-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .auth-badge.connected {
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
    }

    .auth-badge.disconnected {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }

    /* --- Content --- */
    .content {
      padding: 20px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    /* --- Not on Search Page Message --- */
    .not-search-msg {
      text-align: center;
      padding: 24px 12px;
    }

    .not-search-msg .icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .not-search-msg p {
      font-size: 13px;
      color: #64748b;
      line-height: 1.5;
    }

    .not-search-msg a {
      color: #4f46e5;
      text-decoration: none;
      font-weight: 600;
    }

    .not-search-msg a:hover {
      text-decoration: underline;
    }

    /* --- Form --- */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      color: #1e293b;
      background: #f8fafc;
      transition: all 0.2s;
    }

    .form-group input::placeholder {
      color: #94a3b8;
    }

    .form-group input:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.08);
      background: #fff;
    }

    /* --- Buttons --- */
    .primary-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
    }

    .primary-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 12px rgba(79, 70, 229, 0.25);
    }

    .primary-btn:active {
      transform: translateY(0);
    }

    .primary-btn:disabled {
      background: #94a3b8;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .secondary-link {
      display: block;
      text-align: center;
      color: #4f46e5;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      margin-top: 12px;
    }

    .secondary-link:hover {
      text-decoration: underline;
    }

    /* --- Status Boxes --- */
    .status-area {
      margin-top: 16px;
    }

    .success-box {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #f0fdf4;
      border-radius: 8px;
      color: #16a34a;
      font-weight: 600;
      font-size: 13px;
      border: 1px solid #bbf7d0;
      margin-bottom: 12px;
    }

    .error-box {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      background: #fef2f2;
      border-radius: 8px;
      color: #dc2626;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid #fecaca;
      margin-bottom: 12px;
      word-break: break-word;
    }

    .warning-text {
      color: #d97706;
      font-size: 12px;
      text-align: center;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    /* --- Spinner --- */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* --- Footer --- */
    .footer {
      padding: 12px 20px;
      border-top: 1px solid #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-left {
      font-size: 11px;
      color: #94a3b8;
    }

    .sync-link {
      font-size: 12px;
      color: #4f46e5;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
    }

    .sync-link:hover {
      text-decoration: underline;
    }

    /* --- Divider --- */
    .divider {
      height: 1px;
      background: #f1f5f9;
      margin: 0 20px;
    }
  </style>
</head>

<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">A</div>
      <div class="brand">AutoConnect<span>.</span></div>
    </div>
    <span id="auth-badge" class="auth-badge disconnected">Disconnected</span>
  </div>

  <!-- Main Content -->
  <div class="content">
    <!-- Import Section (shown on LinkedIn search pages) -->
    <div id="import-section">
      <div class="section-title">Import prospects from this search</div>

      <div class="form-group">
        <label for="list-name">List Name / Tag (Optional)</label>
        <input type="text" id="list-name" placeholder="e.g. 'CEOs in New York'">
      </div>

      <div id="status-area" class="status-area">
        <button id="start-btn" class="primary-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Start a new import
        </button>
      </div>

      <a href="https://linkedin-camp-web.vercel.app/leads" target="_blank" class="secondary-link">
        View imported prospects →
      </a>

      <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #f1f5f9;">
        <button id="open-panel-btn" class="primary-btn"
          style="background: linear-gradient(135deg, #1e293b 0%, #334155 100%);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="15" y1="3" x2="15" y2="21"></line>
          </svg>
          Open Extraction Panel →
        </button>
        <p style="text-align: center; font-size: 11px; color: #94a3b8; margin-top: 8px;">
          Opens a persistent side panel for extraction
        </p>
      </div>
    </div>

    <!-- Not on search page message -->
    <div id="not-search-section" style="display: none;">
      <div class="not-search-msg">
        <div class="icon">🔍</div>
        <p>Navigate to a <strong>LinkedIn search page</strong> to import prospects.</p>
        <p style="margin-top: 8px;">
          <a href="https://www.linkedin.com/search/results/people/" target="_blank">Open LinkedIn Search →</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-left" id="footer-text">
      <a href="https://linkedin-camp-web.vercel.app" target="_blank"
        style="color: #4f46e5; text-decoration: none; font-weight: 600;">Dashboard</a>
    </span>
    <button id="sync-btn" class="sync-link">🔄 Sync Session</button>
  </div>

  <script src="popup.js"></script>
</body>

</html>
