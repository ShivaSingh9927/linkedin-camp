# Single compose for local dev AND the worker box on prod.
#
# Critical invariant: secrets and connection URLs (DATABASE_URL, REDIS_URL,
# JWT_SECRET) MUST come from the env file, never from this YAML's
# `environment:` block. Docker compose treats `environment:` as higher
# precedence than `env_file:`, so any value placed here silently overrides
# whatever is in .env.local / .env.production. That's how prod ended up
# pointing the API at a freshly-created empty Postgres on the worker box
# instead of the real DB at 10.0.0.4 — the hardcoded `db:5432` won and the
# `.env.production` value was ignored.
#
# Local dev: cp .env.production.example .env.local, fill in dev values.
# Prod worker box: `ln -sf .env.production .env.local` (or pass
# `--env-file .env.production` to compose, which sets the same lookup).

services:
  db:
    image: postgres:15-alpine
    container_name: linkedin-camp-db-local
    restart: always
    environment:
      - POSTGRES_USER=shiva
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=linkedin_camp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: linkedin-camp-redis-local
    restart: always
    ports:
      - "6399:6379"

  backend-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: linkedin-camp-backend:local
    container_name: linkedin-camp-backend-local
    restart: always
    command: ["sh", "-c", "xvfb-run -a node apps/backend/dist/server.js"]
    ports:
      - "3001:3001"
    volumes:
      - /home/shiva/Documents/linkedin-session:/session-storage
    environment:
      - NODE_ENV=production
      - SESSION_STORAGE_PATH=/session-storage
    env_file:
      - .env.local
    depends_on:
      - db
      - redis

  backend-worker:
    image: linkedin-camp-backend:local
    container_name: linkedin-camp-worker-local
    restart: always
    command: ["sh", "-c", "xvfb-run -a node apps/backend/dist/worker-entry.js"]
    volumes:
      - /home/shiva/Documents/linkedin-session:/session-storage
    environment:
      - NODE_ENV=production
      - SESSION_STORAGE_PATH=/session-storage
    env_file:
      - .env.local
    shm_size: 1gb
    depends_on:
      - db
      - redis
      - backend-api

volumes:
  postgres_data_local:
