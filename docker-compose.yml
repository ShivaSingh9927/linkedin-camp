version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: linkedin-camp-db
    restart: always
    environment:
      - POSTGRES_USER=shiva
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=linkedin_camp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
