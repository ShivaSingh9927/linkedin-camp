services:
  db:
    image: postgres:15-alpine
    container_name: linkedin-camp-db
    restart: always
    environment:
      - POSTGRES_USER=shiva
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=linkedin_camp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  reacher:
    image: reacherhq/backend:latest
    container_name: linkedin-camp-reacher
    restart: always
    ports:
      - "8080:8080"
    environment:
      - RCH_HTTP_PORT=8080
      - RCH_VERIFICATION_CONCURRENCY=10
volumes:
  postgres_data:
