# =============================================================================
# Production compose for the WORKER server (Hetzner ubuntu-4gb-hel1-5, 10.0.0.2)
# Runs:  backend-api  +  backend-worker  (same image, two commands)
# Connects to:  postgres / redis / ai-service on the DB server (10.0.0.4)
# Fronted by:   Hetzner LB11 -> 10.0.0.2:3001
# =============================================================================

services:
  backend-api:
    build: .
    image: linkedin-camp-backend:latest
    container_name: backend-api
    restart: unless-stopped
    command: ["sh", "-c", "node apps/backend/dist/server.js"]
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      SENTRY_DSN: ${SENTRY_DSN}
      AI_SERVICE_URL: ${AI_SERVICE_URL}
      GROQ_API: ${GROQ_API}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OUTLOOK_EMAIL: ${OUTLOOK_EMAIL}
      OUTLOOK_APP_PASSWORD: ${OUTLOOK_APP_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION}
      # Sticky-per-account proxy fallback. Without these the container has no
      # PROXY env at all — every LinkedIn login + campaign run exits via the
      # Hetzner Helsinki public IP and LinkedIn instantly throws a device
      # challenge in Finnish. Same vars consumed by session-manager.service
      # and session-validator.service.
      DEFAULT_PROXY_SERVER: ${DEFAULT_PROXY_SERVER}
      DEFAULT_PROXY_PORT: ${DEFAULT_PROXY_PORT}
      DEFAULT_PROXY_USERNAME: ${DEFAULT_PROXY_USERNAME}
      DEFAULT_PROXY_PASSWORD: ${DEFAULT_PROXY_PASSWORD}
      CRM_ENCRYPTION_KEY: ${CRM_ENCRYPTION_KEY}
      SESSION_STORAGE_PATH: ${SESSION_STORAGE_PATH:-/app/sessions}
      INBOX_DIAG: ${INBOX_DIAG:-}
    # Bind the API only to the private-net IP so the public IP never exposes :3001.
    # The Hetzner LB reaches it at 10.0.0.2:3001 over the private network.
    ports:
      - "${PRIVATE_IP}:3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend-worker:
    image: linkedin-camp-backend:latest
    container_name: backend-worker
    restart: unless-stopped
    depends_on:
      - backend-api
    # xvfb-run gives Playwright a virtual display so headed-mode stealth works.
    command: ["sh", "-c", "xvfb-run -a node apps/backend/dist/worker-entry.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      SENTRY_DSN: ${SENTRY_DSN}
      AI_SERVICE_URL: ${AI_SERVICE_URL}
      GROQ_API: ${GROQ_API}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OUTLOOK_EMAIL: ${OUTLOOK_EMAIL}
      OUTLOOK_APP_PASSWORD: ${OUTLOOK_APP_PASSWORD}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION}
      # Sticky-per-account proxy fallback. Without these the container has no
      # PROXY env at all — every LinkedIn login + campaign run exits via the
      # Hetzner Helsinki public IP and LinkedIn instantly throws a device
      # challenge in Finnish. Same vars consumed by session-manager.service
      # and session-validator.service.
      DEFAULT_PROXY_SERVER: ${DEFAULT_PROXY_SERVER}
      DEFAULT_PROXY_PORT: ${DEFAULT_PROXY_PORT}
      DEFAULT_PROXY_USERNAME: ${DEFAULT_PROXY_USERNAME}
      DEFAULT_PROXY_PASSWORD: ${DEFAULT_PROXY_PASSWORD}
      CRM_ENCRYPTION_KEY: ${CRM_ENCRYPTION_KEY}
      SESSION_STORAGE_PATH: ${SESSION_STORAGE_PATH:-/app/sessions}
      INBOX_DIAG: ${INBOX_DIAG:-}
    # Local sessions volume (transitional — replaced by object storage in Phase 2).
    volumes:
      - sessions_data:/app/sessions
    # Chromium needs more shm than the 64MB default or pages will randomly crash.
    shm_size: 1gb

volumes:
  sessions_data:
