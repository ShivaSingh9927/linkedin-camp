version: '3.8'

services:
  backend:
    build: .
    restart: always
    environment:
      - DATABASE_URL=postgresql://shiva:password123@db:5432/linkedin_camp
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=Iamironman@3
      - PORT=3001
      - NODE_ENV=production
      - AI_SERVICE_URL=http://ai-service:8001
      - GROQ_API=${GROQ_API}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - OUTLOOK_EMAIL=${OUTLOOK_EMAIL}
      - OUTLOOK_APP_PASSWORD=${OUTLOOK_APP_PASSWORD}
      - FRONTEND_URL=https://app.qampi.com
      - BACKEND_URL=https://api.qampi.com
      - CORS_ORIGIN=https://app.qampi.com
    ports:
      - "3001:3001"
    depends_on:
      - db
      - redis
    volumes:
      - /root/linkedin-sessions:/app/sessions
    networks:
      - linkedin-network

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=shiva
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=linkedin_camp
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - linkedin-network

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - linkedin-network

  ai-service:
    build: 
      context: ./apps/ai-service
    restart: always
    environment:
      - GROQ_API=${GROQ_API}
    networks:
      - linkedin-network

networks:
  linkedin-network:
    driver: bridge

volumes:
  pg_data:
