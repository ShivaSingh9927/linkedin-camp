[phases.setup]
aptPkgs = [
    "libnss3", 
    "libnspr4", 
    "libatk1.0-0", 
    "libatk-bridge2.0-0", 
    "libcups2", 
    "libdrm2", 
    "libxkbcommon0", 
    "libxcomposite1", 
    "libxdamage1", 
    "libxfixes3", 
    "libxrandr2", 
    "libgbm1", 
    "libasound2", 
    "libpango-1.0-0", 
    "libcairo2",
    "libx11-xcb1",
    "libxcb-dri3-0",
    "libxshmfence1"
]

[phases.build]
cmds = [
    "npm install",
    "npm run build --workspace=apps/backend",
    "npx playwright install chromium"
]

[start]
cmd = "npm run start --workspace=apps/backend"
